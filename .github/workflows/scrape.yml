name: Scrape MangaPlus

on:
  schedule:
    - cron: '55 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser libcurl4-openssl-dev libssl-dev libxml2-dev libmongoose-dev

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'

      - name: Install R packages
        run: |
          Rscript -e "install.packages(c('tidyverse', 'rvest', 'mongolite', 'chromote'), repos='https://cloud.r-project.org')"

      - name: Run scraper
        env:
          MONGO_URL: ${{ secrets.MONGO_URL }}
          CHROMOTE_CHROME: /usr/bin/chromium-browser
        run: Rscript scraper.R