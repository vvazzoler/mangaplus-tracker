name: Scrape MangaPlus

on:
  schedule:
    - cron: '55 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          for i in {1..3}; do
            sudo apt-get install -y chromium-browser libcurl4-openssl-dev libssl-dev libxml2-dev libuv1-dev libfontconfig1-dev libfreetype6-dev libsasl2-dev && break
            if [ $i -lt 3 ]; then
              echo "Install attempt $i failed, retrying..."
              sleep 10
            fi
          done

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-pkgs-${{ hashFiles('**/scrape.yml') }}
          restore-keys: r-pkgs-

      - name: Install R packages
        run: |
          Rscript -e "install.packages(c('dplyr', 'lubridate', 'tidyr', 'rvest', 'mongolite', 'chromote'), repos='https://cloud.r-project.org')"

      - name: Run scraper
        env:
          MONGO_URL: ${{ secrets.MONGO_URL }}
          CHROMOTE_CHROME: /usr/bin/chromium-browser
        run: Rscript mangaplus_scraper.R